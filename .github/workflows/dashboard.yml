# Sector dashboard — nightly refresh + GitHub Pages deploy
#
# Coexistence note (Phase 6 discovery, 2026-05-30):
#   At the time this workflow was authored, the repository had no pkgdown workflow
#   (only .github/workflows/r-check.yml). This workflow therefore OWNS GitHub Pages
#   deployment for cso-toolkit and publishes the entire docs/ tree.
#
#   If a pkgdown workflow is later added that also deploys to Pages, the two will
#   conflict (GitHub Pages allows only one deployment source per repo). At that
#   point the chosen approach is:
#     - Let pkgdown own the Pages deploy (it rebuilds the whole site).
#     - This workflow should then drop the `deploy` job and only commit refreshed
#       files under docs/dashboard/** back to the branch. The pkgdown workflow
#       must use `clean: false` (or otherwise preserve docs/dashboard/) so the
#       dashboard subtree survives pkgdown rebuilds.
#
#   Until then, this workflow handles both refresh and deploy.

name: dashboard

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - develop
      - main
    paths:
      - "docs/dashboard/**"
      - ".github/workflows/dashboard.yml"
  workflow_dispatch:

# Prevent overlapping runs from racing on the same commit / Pages deployment.
concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access via GITHUB_TOKEN for the commit-back step.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install R packages
        run: |
          # collect.R + render.R only. Charts ship as committed static SVGs
          # (make_charts.R is run by the operator, not in CI), so ggplot2 /
          # svglite — and their systemfonts/textshaping system deps — are not
          # installed here.
          install.packages(c(
            "yaml", "rsdmx", "httr", "jsonlite",
            "data.table", "digest"
          ))
        shell: Rscript {0}

      - name: Collect indicators
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DW_PROD_READ_TOKEN: ${{ secrets.DW_PROD_READ_TOKEN }}
        run: Rscript docs/dashboard/collect.R

      - name: Render dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DW_PROD_READ_TOKEN: ${{ secrets.DW_PROD_READ_TOKEN }}
        run: Rscript docs/dashboard/render.R

      - name: Privacy leak-guard
        # DW-Production is private; this dashboard is public. Fail the build if
        # private detail (named individuals, personal/Teams paths, DW-Production
        # source filenames + line numbers, internal infra) appears in any
        # published file. HARD tokens must be absent everywhere; SOFT infra
        # tokens must be absent from the DW-derived sources + the rendered page
        # (cso-toolkit's own public issue/PR titles may legitimately mention them).
        run: |
          set -uo pipefail
          HARD='mjugder|karavan88|dewang8|C:[\\/]Users|[a-z0-9]+_dw\.R|[0-9]+_aggregate[a-z_]*\.R|_aggr\.R|regional_classification\.R|\byear_results\b|\blp_data\b|population\.rds|ECD\.xlsx|CompositionOfRegions|L[0-9]+-[0-9]+|SE\.LPV|060\.DW-MASTER'
          SOFT='OneDrive|corporate proxy|api\.worldbank\.org|01[13]_(raw|wrk)data'
          fail=0
          if grep -rInE "$HARD" docs/dashboard/data docs/dashboard/index.html docs/dashboard/charts/*.svg; then fail=1; fi
          if grep -rInE "$SOFT" docs/dashboard/data/actions docs/dashboard/data/snapshots docs/dashboard/index.html; then fail=1; fi
          if [ "$fail" = 1 ]; then
            echo "::error::Private DW-Production detail detected in published dashboard files (see matches above)."
            exit 1
          fi
          echo "leak-guard: clean — no private detail in published files."
        shell: bash

      - name: Prune history older than retention window
        # Retain ~90 days of nightly history snapshots in git to keep the
        # tracked tree from growing without bound. Older snapshots remain
        # accessible via git history.
        run: |
          set -euo pipefail
          HISTORY_DIR="docs/dashboard/data/history"
          if [ -d "$HISTORY_DIR" ]; then
            # Each subdir is named YYYY-MM-DD. Drop anything older than 90 days.
            find "$HISTORY_DIR" -mindepth 1 -maxdepth 1 -type d -mtime +90 -print -exec rm -rf {} +
          fi
        shell: bash

      - name: Commit refreshed artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard/index.html \
                  docs/dashboard/data/state.json \
                  docs/dashboard/data/history \
                  docs/dashboard/data/sdmx_cache_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "chore(dashboard): nightly refresh [skip ci]"
            # Branch protection on develop/main rejects a direct bot push; that
            # must NOT fail the job, because the deploy step publishes the
            # freshly-rendered workspace regardless. History accumulation in git
            # only happens where the push is allowed (e.g. an unprotected branch).
            git push || echo "::warning::commit-back push rejected (protected branch); live deploy proceeds from the rendered workspace"
          fi
        shell: bash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
