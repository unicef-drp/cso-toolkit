name: R CMD check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new push lands on the same branch.
concurrency:
  group: r-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Reviewer / producer contract is a session-level concept; tests
      # set it explicitly via local_state() per-test.

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: ./r
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::withr
            any::devtools
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: ./r
          upload-snapshots: true
          # R CMD check runs tests/testthat.R automatically when
          # testthat is in Suggests; no separate testthat step needed.
          args: 'c("--no-manual", "--no-build-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'
